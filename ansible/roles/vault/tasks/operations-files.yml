---
- name: Install Vault operational packages
  ansible.builtin.dnf:
    name:
      - logrotate
    state: present

- name: Create Vault operational directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ vault_audit_log_dir }}"
      owner: vault
      group: vault
      mode: "0750"

    - path: "{{ vault_policy_dir }}"
      owner: root
      group: vault
      mode: "0750"

- name: Ensure the Vault audit log exists
  ansible.builtin.file:
    path: "{{ vault_audit_log_path }}"
    state: touch
    owner: vault
    group: vault
    mode: "0600"
    access_time: preserve
    modification_time: preserve

- name: Deploy the MedusaLab administrator policy
  ansible.builtin.copy:
    src: medusalab-admin.hcl
    dest: "{{ vault_admin_policy_path }}"
    owner: root
    group: vault
    mode: "0640"

- name: Deploy Vault audit log rotation
  ansible.builtin.template:
    src: vault-audit.logrotate.j2
    dest: "{{ vault_audit_logrotate_path }}"
    owner: root
    group: root
    mode: "0644"
    validate: /usr/sbin/logrotate --debug %s

- name: Restore Vault operational SELinux contexts
  ansible.builtin.command:
    argv:
      - restorecon
      - -RF
      - "{{ vault_audit_log_dir }}"
      - "{{ vault_policy_dir }}"
      - "{{ vault_audit_logrotate_path }}"
  changed_when: false

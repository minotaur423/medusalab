---
- name: Update system CA trust
  ansible.builtin.command:
    cmd: update-ca-trust
  changed_when: true

- name: Reload firewalld
  ansible.builtin.command:
    cmd: firewall-cmd --reload
  changed_when: true

- name: Restart Vault
  ansible.builtin.systemd:
    name: vault
    state: restarted
    daemon_reload: true

---
vault_server_fqdn: vault01.medusalab.test
vault_server_short_name: vault01
vault_server_ipv4: 192.168.141.12

vault_cluster_name: medusalab-vault
vault_raft_node_id: vault01

vault_api_port: 8200
vault_cluster_port: 8201

vault_firewall_zone: public
vault_firewall_source_ipv4: 192.168.141.0/24

# Shared Vault filesystem paths
vault_config_dir: /etc/vault.d
vault_tls_trust_path: /etc/pki/ca-trust/source/anchors/medusalab-vault-bootstrap.pem

# Audit configuration
vault_audit_device_name: file
vault_audit_log_dir: /var/log/vault
vault_audit_log_path: /var/log/vault/audit.log
vault_audit_log_rotate_count: 30
vault_audit_logrotate_path: /etc/logrotate.d/vault-audit

# Administrative policy
vault_policy_dir: /etc/vault.d/policies
vault_admin_policy_name: medusalab-admin
vault_admin_policy_path: /etc/vault.d/policies/medusalab-admin.hcl

# Remote CLI account
vault_cli_user: minotaur423
vault_cli_home: /home/minotaur423

# KV v2 secrets engine
vault_kv_mount_path: secret
vault_kv_description: MedusaLab versioned secrets
vault_kv_max_versions: 10
vault_kv_cas_required: false
vault_kv_delete_version_after: 0s

# Human secrets operator policy
vault_secrets_operator_policy_name: medusalab-secrets-operator
vault_secrets_operator_policy_path: >-
  /etc/vault.d/policies/medusalab-secrets-operator.hcl

# Demo application policy
vault_demo_app_policy_name: medusalab-demo-app
vault_demo_app_policy_path: >-
  /etc/vault.d/policies/medusalab-demo-app.hcl
vault_demo_app_secret_prefix: apps/demo
